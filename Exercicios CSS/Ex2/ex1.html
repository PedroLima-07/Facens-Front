<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Exercício 1</title>

    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
      }

      /* Sidebar */
      .sidebar {
        width: 20%;
        height: 100vh;
        background-color: #2c3e50;
        color: white;
        float: left;
        position: relative;
        padding: 20px;
        box-sizing: border-box;
      }

      /* Conteúdo */
      .content {
        width: 80%;
        height: 100vh;
        background-color: #ecf0f1;
        float: right;
        position: relative;

        /* Centralizar */
        display: flex;
        justify-content: center;
        align-items: center;
      }

      /* Links */
      .sidebar a {
        display: block;
        color: white;
        text-decoration: none;
        margin: 10px 0;
      }
    </style>
  </head>

  <body>
    <div class="sidebar">
      <h2>Menu</h2>
      <a href="#">Home</a>
      <a href="#">Sobre</a>
      <a href="#">Contato</a>
    </div>

    <div class="content">
      <h1>Conteúdo Principal</h1>
    </div>
  </body>
</html>
