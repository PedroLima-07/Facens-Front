<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Exercício 2</title>

    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
      }

      /* Topo */
      .header {
        position: fixed;
        top: 0;
        width: 100%;
        height: 60px;
        background-color: #1abc9c;
        color: white;
        text-align: center;
        line-height: 60px;
      }

      /* Sidebar */
      .sidebar {
        position: fixed;
        top: 60px;
        left: 0;
        width: 200px;
        height: calc(100vh - 120px);
        background-color: #34495e;
        color: white;
        padding: 15px;
        box-sizing: border-box;
      }

      /* Conteúdo */
      .content {
        margin-left: 200px;
        margin-top: 60px;
        margin-bottom: 60px;
        padding: 20px;
        background-color: #ecf0f1;
        min-height: calc(100vh - 120px);
      }

      /* Rodapé */
      .footer {
        position: fixed;
        bottom: 0;
        width: 100%;
        height: 60px;
        background-color: #1abc9c;
        color: white;
        text-align: center;
        line-height: 60px;
      }
    </style>
  </head>

  <body>
    <div class="header">Menu Superior</div>

    <div class="sidebar">
      <h3>Menu Lateral</h3>
      <p>Item 1</p>
      <p>Item 2</p>
    </div>

    <div class="content">
      <h1>Conteúdo Principal</h1>
      <p>Aqui vai o conteúdo da página.</p>
    </div>

    <div class="footer">Rodapé</div>
  </body>
</html>
